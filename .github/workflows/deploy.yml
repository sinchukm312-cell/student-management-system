name: Terraform Azure Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Plan
      working-directory: terraform
      run: terraform plan

    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve

    - name: Login to ACR
      run: |
        echo "${{ secrets.ACR_PASSWORD }}" | docker login myacr19.azurecr.io \
        -u "${{ secrets.ACR_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t myacr19.azurecr.io/devops-app:latest .

    - name: Push Docker Image to ACR
      run: docker push myacr19.azurecr.io/devops-app:latest