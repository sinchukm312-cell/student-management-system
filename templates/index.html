<!DOCTYPE html>
<html>
<head>
    <title>DevOps App</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 DevOps Project Running</h1>
        <p><b>Hostname:</b> {{ hostname }}</p>
        <p><b>IP Address:</b> {{ ip }}</p>
    </div>
</body>
</html>
